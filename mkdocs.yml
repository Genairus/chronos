site_name: Chronos
site_description: A requirements modeling language for AI-assisted development
site_url: https://genairus.github.io/chronos/
repo_name: Genairus/chronos
repo_url: https://github.com/Genairus/chronos
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2024 Genairus

theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - navigation.expand
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: slate
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

# Exclude internal development notes
exclude_docs: |
  status/
  ir/

nav:
  - Home: index.md
  - Platform Vision: vision.md
  - The "Chronos 13":
    - Overview: shapes/index.md
    - Core Data (Entity, Shape, Enum): shapes/data.md
    - Flows (Journey, Statemachine): shapes/flows.md
    - Governance (Policy, Invariant, Deny, Error): shapes/governance.md
    - Relationships & Actors: shapes/actors.md
  - Industry Blueprints:
    - Fintech (Payments): examples/fintech.md
    - Healthcare (AI Triage): examples/healthcare.md
  - AI Workflows:
    - AI Agent Setup: ai-agent-setup.md
    - Prompting with Chronos: ai-bot-requirements-howto.md
  - Tooling:
    - Installation: install.md
    - CLI Reference: cli.md
    - Generators: generators.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Genairus/chronos
